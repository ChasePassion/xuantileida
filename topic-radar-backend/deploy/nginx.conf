server {
    listen 80;
    server_name xuanti.jutongbao.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name xuanti.jutongbao.online;

    # SSL 证书路径 (使用 certbot 签发后替换)
    ssl_certificate /etc/letsencrypt/live/xuanti.jutongbao.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xuanti.jutongbao.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger 文档代理
    location /docs {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 管理后台静态文件代理
    location /admin.html {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # 第三方支付回调接口（公开，无需鉴权）
    location /rest/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 支付回调超时设置
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip 压缩
    gzip on;
    gzip_types application/json application/javascript text/css;
    gzip_min_length 1000;

    # 请求体大小限制
    client_max_body_size 10m;
}
